version: '3.9'

services:
  super-erp-app:
    build: .
    container_name: super-erp
    image: docker.io/raseefk/super-erp:latest
    ports:
      - "8085:8085"
    volumes:
      # H2 database file persists across container restarts
      - super_erp_data:/app/data
      - super_erp_uploads:/app/uploads
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/super_erp_db
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=SuperErp@2026!
      - APP_ADMIN_USERNAME=admin
      - APP_ADMIN_PASSWORD=Admin@1234
      # ── Update these with your actual company details ──
      - APP_COMPANY_NAME=Super ERP
      - APP_COMPANY_ADDRESS=Main Business District, City, State - PIN
      - APP_COMPANY_PHONE=+91 XXXXX XXXXX
      - APP_COMPANY_EMAIL=info@supererp.com
      - APP_COMPANY_GSTNUMBER=YOUR_GSTIN_HERE
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  super_erp_data:
    driver: local
  super_erp_uploads:
    driver: local
