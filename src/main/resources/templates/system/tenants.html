<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(activePage='system-tenants')}"></div>

<div id="main-content">
    <div th:replace="~{fragments/layout :: topbar(pageTitle=${pageTitle})}"></div>
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-1 fw-bold text-primary">Global Tenant Management</h4>
                <p class="text-muted small mb-0">Manage all organizations on the platform, subscriptions, and quotas.</p>
            </div>
            <a th:href="@{/system/tenants/new}" class="btn btn-primary shadow-sm">
                <i class="bi bi-building-plus me-2"></i> Register New Tenant
            </a>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card border-0 shadow-sm p-3" style="border-radius: 12px;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-primary-subtle text-primary p-3 rounded-3">
                            <i class="bi bi-buildings" style="font-size: 1.5rem;"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Total Tenants</div>
                            <div class="h4 mb-0 fw-bold" th:text="${#lists.size(tenants)}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Add more stats here if needed -->
        </div>

        <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 12px;">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Tenant Name</th>
                            <th>Slug / Subdomain</th>
                            <th>Plan</th>
                            <th>Status</th>
                            <th>Created At</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tenant : ${tenants}">
                            <td class="ps-4">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="bg-light rounded-circle d-flex align-items-center justify-content-center"
                                         style="width: 40px; height: 40px; font-weight: bold; color: var(--navy-deep);"
                                         th:text="${#strings.substring(tenant.name, 0, 1)}">T</div>
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${tenant.name}">Acme Corp</div>
                                        <div class="text-muted x-small" th:text="${tenant.id}">UUID</div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <code class="bg-light px-2 py-1 rounded" th:text="${tenant.slug + '.erp.com'}">slug.erp.com</code>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${tenant.plan == 'ENTERPRISE' ? 'bg-warning' : 'bg-info'}" th:text="${tenant.plan}">STANDARD</span>
                            </td>
                            <td>
                                <span th:if="${tenant.active}" class="badge bg-success-subtle text-success border border-success-subtle px-2">ACTIVE</span>
                                <span th:unless="${tenant.active}" class="badge bg-danger-subtle text-danger border border-danger-subtle px-2">INACTIVE</span>
                            </td>
                            <td class="text-muted small" th:text="${#temporals.format(tenant.createdAt, 'dd MMM yyyy')}">Date</td>
                            <td class="text-end pe-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/system/tenants/{id}/edit(id=${tenant.id})}"
                                       class="btn btn-sm btn-outline-primary" title="Edit Tenant">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <form th:if="${tenant.active}" th:action="@{/system/tenants/{id}/deactivate(id=${tenant.id})}" method="POST"
                                          onsubmit="return confirm('Deactivate this tenant? Users will be blocked immediately.')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Deactivate">
                                            <i class="bi bi-slash-circle"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
