<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Vendors')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('vendors')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Vendors')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
  <form th:action="@{/admin/vendors}" method="get" class="d-flex gap-2">
    <input type="text" name="search" class="form-control form-control-sm" placeholder="Search vendors…" th:value="${search}" style="width:220px;"/>
    <button type="submit" class="btn btn-sm btn-gold">Search</button>
    <a th:href="@{/admin/vendors}" class="btn btn-sm btn-outline-secondary">Clear</a>
  </form>
  <a th:href="@{/admin/vendors/new}" class="btn btn-sm btn-gold"><i class="bi bi-plus-lg me-1"></i>New Vendor</a>
</div>
<div class="card card-levanto">
  <div class="card-header"><i class="bi bi-truck me-2"></i>Vendor Directory</div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-levanto mb-0">
        <thead><tr><th>#</th><th>Name</th><th>Contact</th><th>Phone</th><th>Material Supplied</th><th>GSTIN</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:each="v, idx : ${vendorsPage.content}">
            <td th:text="${idx.count}">1</td>
            <td><strong th:text="${v.name}">-</strong></td>
            <td th:text="${v.contactPerson ?: '-'}">-</td>
            <td><a th:href="'tel:'+${v.phone}" th:text="${v.phone}" style="color:#C8972A;">-</a></td>
            <td><small th:text="${v.materialSupplied ?: '-'}">-</small></td>
            <td><small th:text="${v.gstNumber ?: '-'}">-</small></td>
            <td>
              <div class="btn-group btn-group-sm">
                <a th:href="@{/admin/vendors/{id}/edit(id=${v.id})}" class="btn btn-navy"><i class="bi bi-pencil"></i></a>
                <button class="btn btn-outline-secondary" th:if="${v.bankAccountNumber != null}" 
                        data-bs-toggle="popover" data-bs-trigger="focus" title="Bank Details"
                        th:data-bs-content="${'Bank: ' + v.bankName + '\nAcc: ' + v.bankAccountNumber + '\nIFSC: ' + v.ifscCode}">
                  <i class="bi bi-bank"></i>
                </button>
                <button class="btn btn-outline-danger" onclick="delVendor(this)" th:data-id="${v.id}"><i class="bi bi-trash"></i></button>
              </div>
            </td>
          </tr>
          <tr th:if="${vendorsPage.totalElements==0}"><td colspan="7" class="text-center text-muted py-4">No vendors found.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
<script>
function delVendor(btn){if(!confirm('Delete vendor?'))return;fetch('/admin/vendors/'+btn.dataset.id,{method:'DELETE'}).then(r=>r.json()).then(d=>{if(d.success)location.reload();});}
</script>
</body></html>
