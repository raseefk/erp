<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: head('Manage Holidays')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('holidays')}"></th:block>
<div id="main">
    <th:block th:insert="~{fragments/layout :: topbar('Manage Holidays')}"></th:block>
    <div class="pb">
        <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
        
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Annual Holidays</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <form class="d-flex align-items-center" th:action="@{/settings/holidays}" method="get">
                    <label class="me-2 fw-bold">Year</label>
                    <select name="year" class="form-select form-select-sm" onchange="this.form.submit()">
                        <option th:each="y : ${years}" th:value="${y}" th:text="${y}" th:selected="${y == selectedYear}"></option>
                    </select>
                </form>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0 text-primary"><i class="bi bi-calendar-plus"></i> Add New Holiday</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/settings/holidays/add}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Date</label>
                                <input type="date" class="form-control" name="date" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Holiday Name</label>
                                <input type="text" class="form-control" name="name" placeholder="e.g., Independence Day" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-circle"></i> Add Holiday</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-list-stars"></i> Holidays in <span th:text="${selectedYear}"></span></h5>
                        <span class="badge bg-primary rounded-pill" th:text="${holidays.size()} + ' days'"></span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Date</th>
                                        <th>Day</th>
                                        <th>Holiday Name</th>
                                        <th class="text-end">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${holidays.empty}">
                                        <td colspan="4" class="text-center text-muted py-4">No holidays recorded for this year.</td>
                                    </tr>
                                    <tr th:each="holiday : ${holidays}">
                                        <td th:text="${#temporals.format(holiday.date, 'dd MMM yyyy')}" class="fw-bold"></td>
                                        <td th:text="${#strings.capitalize(#strings.toLowerCase(holiday.date.dayOfWeek.name()))}"></td>
                                        <td th:text="${holiday.name}"></td>
                                        <td class="text-end">
                                            <form th:action="@{'/settings/holidays/' + ${holiday.id} + '/delete'}" method="post" class="d-inline" onsubmit="return confirm('Are you sure you want to remove this holiday?');">
                                                <input type="hidden" name="year" th:value="${selectedYear}">
                                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Remove</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
