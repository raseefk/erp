<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Approval Queue')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('approval')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Expense Approval Queue')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">

      <!-- Header stats -->
      <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
        <div class="stat-card" style="min-width:220px;">
          <div class="stat-icon" style="background:#fef9c3;color:#d97706;">
            <i class="bi bi-hourglass-split"></i>
          </div>
          <div>
            <div class="stat-num" style="color:#d97706;" th:text="${totalPending}">0</div>
            <div class="stat-lbl">Pending Approvals</div>
          </div>
        </div>
        <div th:if="${totalPending == 0}" class="alert-lv p-3 rounded flex-fill">
          <i class="bi bi-check-circle me-2" style="color:#16a34a;"></i>
          <strong>All clear!</strong> No pending expenses waiting for approval.
        </div>
      </div>

      <!-- Grouped by project -->
      <div th:each="entry : ${pendingGrouped}" class="mb-4">
        <div class="card card-lv">

          <!-- Project header -->
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2"
               style="background:linear-gradient(135deg,#0F2338,#1A3A5C);">
            <div class="d-flex align-items-center gap-3">
              <i class="bi bi-kanban" style="color:#C8972A;font-size:1.2rem;"></i>
              <div>
                <div style="font-weight:700;color:#fff;"
                     th:text="${entry.key.name}">Project</div>
                <small style="color:#7A9FBF;"
                       th:text="${entry.key.clientName+' | '+entry.key.location}">-</small>
              </div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <span class="badge" style="background:#d97706;color:#fff;font-size:.82rem;"
                    th:text="${#lists.size(entry.value)}+' pending'">0</span>
              <!-- Analytics link -->
              <a th:href="'/admin/approval/analytics/'+${entry.key.id}"
                 class="btn btn-sm btn-outline-secondary" style="color:#C8972A;border-color:#C8972A;">
                <i class="bi bi-graph-up me-1"></i>Analytics
              </a>
              <!-- Bulk approve -->
              <form th:action="@{/admin/approval/approve-all/{id}(id=${entry.key.id})}" method="post">
                <button type="submit" class="btn btn-sm btn-gold fw-bold"
                        onclick="return confirm('Approve ALL pending expenses for this project?')">
                  <i class="bi bi-check2-all me-1"></i>Approve All
                </button>
              </form>
            </div>
          </div>

          <!-- Expense rows -->
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-lv mb-0">
                <thead>
                  <tr>
                    <th>Date</th><th>Job Card</th><th>Category</th>
                    <th>Description</th><th>Amount ₹</th><th>Submitted By</th>
                    <th>Receipt</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="exp : ${entry.value}">
                    <td>
                      <small th:text="${#temporals.format(exp.expenseDate,'dd MMM yyyy')}">-</small>
                    </td>
                    <td>
                      <span class="badge badge-navy" th:text="${exp.jobCard.phase}">-</span>
                    </td>
                    <td>
                      <span class="badge"
                            th:text="${exp.category}"
                            style="background:#C8972A;color:#0F2338;">
                      </span>
                    </td>
                    <td th:text="${exp.description}">-</td>
                    <td class="fw-bold text-danger"
                        th:text="'₹ '+${#numbers.formatDecimal(exp.amount,1,'COMMA',2,'POINT')}">-</td>
                    <td>
                      <small th:text="${exp.submittedBy != null ? exp.submittedBy.fullName : '—'}">-</small>
                    </td>
                    <td>
                      <a th:if="${exp.attachmentPath != null}"
                         th:href="'/admin/finance/expenses/'+${exp.id}+'/attachment'"
                         target="_blank" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-paperclip"></i>
                      </a>
                      <span th:if="${exp.attachmentPath == null}" class="text-muted">—</span>
                    </td>
                    <td>
                      <div class="btn-group btn-group-sm">
                        <button class="btn btn-success fw-bold"
                                th:onclick="'doApprove('+${exp.id}+', this)'"
                                title="Approve → posts to company ledger">
                          <i class="bi bi-check-lg"></i>
                        </button>
                        <button class="btn btn-outline-danger"
                                th:onclick="'doReject('+${exp.id}+', this)'"
                                title="Reject">
                          <i class="bi bi-x-lg"></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>

                <!-- Project subtotal -->
                <tfoot th:with="projectTotal=${#aggregates.sum(entry.value.![amount])}">
                  <tr style="background:#f0f4f8;">
                    <td colspan="4" class="fw-bold text-end text-muted">Project Subtotal</td>
                    <td class="fw-bold text-danger">
                      ₹ <span th:text="${#numbers.formatDecimal(projectTotal, 1, 'COMMA', 2, 'POINT')}">0</span>
                    </td>
                    <td colspan="3"></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div th:if="${pendingGrouped.isEmpty()}" class="card card-lv">
        <div class="card-body text-center py-5">
          <i class="bi bi-check-circle-fill" style="font-size:3rem;color:#16a34a;display:block;margin-bottom:.8rem;"></i>
          <h5 class="fw-bold">All caught up!</h5>
          <p class="text-muted">No site expenses are waiting for approval.</p>
          <a href="/admin/projects" class="btn btn-gold">View Projects</a>
        </div>
      </div>

    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
<script>
function doApprove(id, btn) {
  if(!confirm('Approve this expense?')) return;
  const csrfInput = document.querySelector('input[name="_csrf"]');
  const csrfToken = csrfInput ? csrfInput.value : '';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
  
  fetch('/admin/approval/approve/'+id, {
    method:'POST',
    headers: { 'X-CSRF-TOKEN': csrfToken }
  })
    .then(r => {
      if (!r.ok) return r.text().then(t => { throw new Error(t || r.statusText) });
      return r.json();
    })
    .then(d => {
      if (d.success) {
        const row = btn.closest('tr');
        row.style.opacity = '0.4';
        row.style.transition = 'opacity .4s';
        setTimeout(() => location.reload(), 300);
      } else {
        alert("Error: " + d.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg"></i>';
      }
    })
    .catch(err => {
      console.error(err);
      alert("Failed to approve: " + err.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-check-lg"></i>';
    });
}

function doReject(id, btn) {
  if (!confirm('Reject this expense?')) return;
  const csrfInput = document.querySelector('input[name="_csrf"]');
  const csrfToken = csrfInput ? csrfInput.value : '';
  btn.disabled = true;
  
  fetch('/admin/approval/reject/'+id, {
    method:'POST',
    headers: { 'X-CSRF-TOKEN': csrfToken }
  })
    .then(r => {
      if (!r.ok) return r.text().then(t => { throw new Error(t || r.statusText) });
      return r.json();
    })
    .then(d => {
      if (d.success) location.reload();
      else { alert("Error: " + d.message); btn.disabled = false; }
    })
    .catch(err => {
      console.error(err);
      alert("Failed to reject: " + err.message);
      btn.disabled = false;
    });
}
</script>
</body>
</html>
