<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: head('Attendance Report')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('attendance-report')}"></th:block>
<div id="main">
    <th:block th:insert="~{fragments/layout :: topbar('Attendance Report')}"></th:block>
    <div class="pb">
        <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
        
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Attendance Report</h1>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-light">
                <h5 class="mb-0">Filter Records</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/hr/attendance/report}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Year</label>
                        <select name="year" class="form-select">
                            <option th:each="y : ${#numbers.sequence(#dates.year(#dates.createNow()) - 5, #dates.year(#dates.createNow()))}"
                                    th:value="${y}" th:text="${y}" th:selected="${y == selectedYear}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Month</label>
                        <select name="month" class="form-select">
                            <option value="1" th:selected="${selectedMonth == 1}">January</option>
                            <option value="2" th:selected="${selectedMonth == 2}">February</option>
                            <option value="3" th:selected="${selectedMonth == 3}">March</option>
                            <option value="4" th:selected="${selectedMonth == 4}">April</option>
                            <option value="5" th:selected="${selectedMonth == 5}">May</option>
                            <option value="6" th:selected="${selectedMonth == 6}">June</option>
                            <option value="7" th:selected="${selectedMonth == 7}">July</option>
                            <option value="8" th:selected="${selectedMonth == 8}">August</option>
                            <option value="9" th:selected="${selectedMonth == 9}">September</option>
                            <option value="10" th:selected="${selectedMonth == 10}">October</option>
                            <option value="11" th:selected="${selectedMonth == 11}">November</option>
                            <option value="12" th:selected="${selectedMonth == 12}">December</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Employee</label>
                        <select name="employeeId" class="form-select">
                            <option value="">-- All Employees --</option>
                            <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}" th:selected="${emp.id == selectedEmployeeId}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-filter"></i> Filter</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    Results for 
                    <span th:text="${selectedMonth + '/' + selectedYear}"></span>
                    <span th:if="${selectedEmployeeId != null}" class="badge bg-info ms-2">Filtered by Employee</span>
                </h5>
                <a class="btn btn-sm btn-outline-success" 
                   th:href="@{/hr/attendance/report/export/pdf(year=${selectedYear}, month=${selectedMonth}, employeeId=${selectedEmployeeId})}">
                   <i class="bi bi-file-earmark-pdf"></i> Export PDF
                </a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Date</th>
                                <th>Employee</th>
                                <th>Clock In</th>
                                <th>Clock Out</th>
                                <th>Status</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${attendances.empty}">
                                <td colspan="6" class="text-center text-muted py-4">No attendance records found for the selected criteria.</td>
                            </tr>
                            <tr th:each="record : ${attendances}">
                                <td th:text="${#temporals.format(record.date, 'dd MMM yyyy')}"></td>
                                <td th:text="${record.employee.name}"></td>
                                <td th:text="${record.clockInTime != null ? #temporals.format(record.clockInTime, 'HH:mm') : '-'}"></td>
                                <td th:text="${record.clockOutTime != null ? #temporals.format(record.clockOutTime, 'HH:mm') : '-'}"></td>
                                <td>
                                    <span class="badge" th:classappend="${
                                        record.status == 'PRESENT' ? 'bg-success' : 
                                        (record.status == 'ABSENT' || record.status == 'LOSS OF PAY' ? 'bg-danger' : 
                                        (record.status == 'HOLIDAY' || record.status == 'ON LEAVE' ? 'bg-primary' : 
                                        (record.status == 'WEEKEND' ? 'bg-secondary' : 'bg-info')))
                                    }" th:text="${record.status}"></span>
                                    <span th:if="${record.manualCorrection}" class="badge bg-secondary ms-1" title="Manually Corrected"><i class="bi bi-wrench"></i></span>
                                </td>
                                <td th:text="${record.notes ?: '-'}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white border-0 py-3" th:if="${attendancesPage.totalPages > 1}">
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted" th:text="'Showing ' + ${attendancesPage.numberOfElements} + ' of ' + ${attendancesPage.totalElements} + ' records (Page ' + (${currentPage}+1) + ' of ' + ${attendancesPage.totalPages} + ')'"></small>
                    <nav>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/hr/attendance/report(year=${selectedYear}, month=${selectedMonth}, employeeId=${selectedEmployeeId}, page=${currentPage - 1})}">Previous</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == attendancesPage.totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/hr/attendance/report(year=${selectedYear}, month=${selectedMonth}, employeeId=${selectedEmployeeId}, page=${currentPage + 1})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
        </div>

    </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
