<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' | Super ERP Admin'">Super ERP Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <style>
    :root {
      --sys-bg:     #0f172a;
      --sys-mid:    #1e293b;
      --sys-border: #334155;
      --sys-accent: #f59e0b;
      --sys-text:   #e2e8f0;
      --sys-muted:  #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    #sys-sidebar {
      width: 240px; min-height: 100vh; background: var(--sys-bg);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; z-index: 1000;
      transition: transform .25s ease;
    }
    .sys-brand {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--sys-border);
      text-decoration: none;
    }
    .sys-brand .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 700;
      color: #fff; line-height: 1.2;
    }
    .sys-brand .brand-badge {
      display: inline-block; margin-top: 6px;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--sys-bg);
      background: var(--sys-accent); padding: 2px 8px; border-radius: 20px;
    }
    .sys-nav { list-style: none; padding: 1rem 0; flex: 1; }
    .sys-nav .nav-sec {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--sys-muted);
      padding: 0.5rem 1.25rem 0.25rem;
    }
    .sys-nav li a {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.6rem 1.25rem; color: var(--sys-text);
      text-decoration: none; font-size: 0.85rem; font-weight: 500;
      border-radius: 0; transition: background .15s, color .15s;
    }
    .sys-nav li a:hover { background: var(--sys-mid); color: var(--sys-accent); }
    .sys-nav li a.active {
      background: var(--sys-mid);
      color: var(--sys-accent);
      border-left: 3px solid var(--sys-accent);
    }
    .sys-nav li a i { font-size: 1rem; width: 20px; text-align: center; }

    /* ── Sidebar footer ── */
    .sys-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--sys-border);
      font-size: 0.75rem; color: var(--sys-muted);
    }
    .sys-footer a { color: var(--sys-muted); text-decoration: none; }
    .sys-footer a:hover { color: var(--sys-accent); }

    /* ── Main content ── */
    #sys-main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }

    /* ── Topbar ── */
    #sys-topbar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: .75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .sys-page-title { font-size: 1rem; font-weight: 600; color: #1e293b; }
    .sys-user-pill {
      display: flex; align-items: center; gap: .5rem;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 20px; padding: .35rem .85rem;
      font-size: .8rem; font-weight: 500; color: #475569;
    }
    .sys-user-pill .badge-admin {
      background: #dc2626; color: #fff;
      font-size: .58rem; padding: 2px 6px; border-radius: 10px;
    }
    @media(max-width:991px) {
      #sys-sidebar { transform: translateX(-100%); }
      #sys-sidebar.open { transform: translateX(0); }
      #sys-main { margin-left: 0; }
    }
  </style>
</head>

<body>

<!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
<nav th:fragment="sidebar(activePage)" id="sys-sidebar">

  <a href="/system/dashboard" class="sys-brand" style="display:block;">
    <div class="brand-title">Super ERP</div>
    <span class="brand-badge">&#x2022; System Admin</span>
  </a>

  <ul class="sys-nav">
    <li class="nav-sec">Management</li>

    <li>
      <a href="/system/dashboard"
         th:classappend="${activePage == 'system-dashboard'} ? ' active' : ''">
        <i class="bi bi-grid-1x2-fill"></i> Tenant Dashboard
      </a>
    </li>

    <li>
      <a href="/system/tenants"
         th:classappend="${activePage == 'system-tenants'} ? ' active' : ''">
        <i class="bi bi-building-fill-gear"></i> Tenant Management
      </a>
    </li>
  </ul>

  <div class="sys-footer">
    <a th:href="@{/logout}"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
  </div>

</nav>

<!-- ── TOPBAR ──────────────────────────────────────────────────────────── -->
<div th:fragment="topbar(pageTitle)" id="sys-topbar">
  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-sm d-lg-none"
            onclick="document.getElementById('sys-sidebar').classList.toggle('open')"
            style="border:1px solid #cbd5e1;">
      <i class="bi bi-list"></i>
    </button>
    <span class="sys-page-title" th:text="${pageTitle}">Page</span>
  </div>
  <div class="sys-user-pill">
    <i class="bi bi-shield-fill-check text-danger"></i>
    <span sec:authentication="name">superadmin</span>
    <span class="badge-admin">SUPER ADMIN</span>
  </div>
</div>

<!-- ── ALERTS ──────────────────────────────────────────────────────────── -->
<div th:fragment="alerts">
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible mx-4 mt-3 mb-0" role="alert">
    <i class="bi bi-check-circle me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible mx-4 mt-3 mb-0" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</div>

<!-- ── SCRIPTS ─────────────────────────────────────────────────────────── -->
<div th:fragment="scripts">
  <th:block th:replace="${scripts} ?: ~{}"></th:block>
</div>

</body>
</html>
