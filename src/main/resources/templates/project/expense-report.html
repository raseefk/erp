<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: head('Project Expense Report')}"></head>
<body class="bg-light">
<th:block th:insert="~{fragments/layout :: sidebar('projects')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Expense Report')}"></th:block>
  <div class="pb-5">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    
    <div class="container-fluid mt-3">
      <!-- Back Link -->
      <div class="mb-3">
        <a th:href="'/admin/projects/'+${project.id}" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Back to Project
        </a>
      </div>

      <!-- Header Card -->
      <div class="card card-lv mb-4 border-0 shadow-sm">
        <div class="card-body p-4" style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; border-radius: 12px;">
          <div class="row align-items-center">
            <div class="col-md-7">
              <h4 class="mb-1" style="font-family:'Cormorant Garamond',serif; font-size: 1.8rem;" th:text="${project.name}">-</h4>
              <p class="mb-0 opacity-75 small"><i class="bi bi-person me-1"></i> Client: <span th:text="${project.clientName}">-</span></p>
            </div>
            <div class="col-md-5 text-md-end mt-3 mt-md-0">
              <div class="d-inline-block text-center me-4">
                <div class="h5 mb-0 fw-bold" th:text="'₹'+${#numbers.formatDecimal(totalApproved,1,'COMMA',2,'POINT')}">₹0.00</div>
                <small class="opacity-75" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;">Total Approved</small>
              </div>
              <div class="d-inline-block text-center">
                <div class="h5 mb-0 fw-bold" style="color: #fca5a5;" th:text="'₹'+${#numbers.formatDecimal(totalPending,1,'COMMA',2,'POINT')}">₹0.00</div>
                <small class="opacity-75" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;">Total Pending</small>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Listing Table -->
      <div class="card card-lv border-0 shadow-sm" style="border-radius: 12px; overflow: hidden;">
        <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
          <h6 class="mb-0 fw-bold" style="color: #991b1b;"><i class="bi bi-wallet2 me-2"></i>Expense Details</h6>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" style="font-size: 0.9rem;">
              <thead class="bg-light">
                <tr style="border-bottom: 2px solid #edf2f7;">
                  <th class="px-4 py-3" style="width: 15%;">Date</th>
                  <th class="py-3" style="width: 15%;">Type</th>
                  <th class="py-3" style="width: 15%;">Job Card</th>
                  <th class="py-3">Description</th>
                  <th class="py-3 text-end">Amount</th>
                  <th class="px-4 py-3 text-center">Status</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="exp : ${expenses}" style="border-bottom: 1px solid #f1f5f9;">
                  <td class="px-4 py-3 text-muted" th:text="${#temporals.format(exp.expenseDate, 'dd MMM yyyy')}">-</td>
                  <td class="py-3">
                    <span class="badge" 
                          th:text="${exp.category}"
                          style="background: #fecaca; color: #991b1b;">
                    </span>
                  </td>
                  <td class="py-3">
                    <span th:if="${exp.jobCard != null}" class="badge bg-secondary bg-opacity-10 text-secondary" th:text="${exp.jobCard.phase}">-</span>
                    <span th:if="${exp.jobCard == null}" class="text-muted small">General</span>
                  </td>
                  <td class="py-3">
                    <div class="text-navy" th:text="${exp.description}">-</div>
                    <small class="text-muted" th:if="${exp.submittedBy != null}" th:text="'by ' + ${exp.submittedBy.fullName}"></small>
                  </td>
                  <td class="py-3 text-end fw-bold" th:text="'₹'+${#numbers.formatDecimal(exp.amount,1,'COMMA',2,'POINT')}">-</td>
                  <td class="px-4 py-3 text-center">
                    <span th:if="${exp.status.name() == 'NEW'}" class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25">PENDING</span>
                    <span th:if="${exp.status.name() == 'APPROVED'}" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25">APPROVED</span>
                    <span th:if="${exp.status.name() == 'REJECTED'}" class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25">REJECTED</span>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(expenses)}">
                  <td colspan="6" class="text-center text-muted py-5">
                    <i class="bi bi-info-circle d-block mb-2" style="font-size: 2rem;"></i>
                    No expenses recorded for this project yet.
                  </td>
                </tr>
                <!-- Total Row -->
                <tr th:if="${not #lists.isEmpty(expenses)}" class="bg-light fw-bold" style="border-top: 2px solid #991b1b;">
                  <td colspan="4" class="px-4 py-3 text-end" style="color: #991b1b;">APPROVED TOTAL</td>
                  <td class="py-3 text-end" style="color: #991b1b;" th:text="'₹'+${#numbers.formatDecimal(totalApproved,1,'COMMA',2,'POINT')}">-</td>
                  <td class="px-4 py-3"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</div>

<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
