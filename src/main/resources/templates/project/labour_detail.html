<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Project Labour Detail')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('projects')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Project Labour Detail')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">

      <div class="mb-3">
        <a th:href="'/admin/projects/'+${project.id}" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Back to <span th:text="${project.name}">Project</span>
        </a>
      </div>

      <div class="card card-lv mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;">
            <i class="bi bi-person me-2"></i><span th:text="${labour.name}"></span>
          </span>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-4">
              <small style="color:#C8972A;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;">Phone</small>
              <div class="fw-bold" th:text="${labour.phone ?: '—'}">-</div>
            </div>
            <div class="col-md-4">
              <small style="color:#C8972A;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;">Default Wage</small>
              <div class="fw-bold" th:text="'₹ ' + ${#numbers.formatDecimal(labour.defaultWage, 1, 'COMMA', 2, 'POINT')}">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card card-lv">
        <div class="card-header"><i class="bi bi-calendar3 me-2"></i>Attendance & Wages History</div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-lv mb-0">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Job Card Phase</th>
                  <th>Wage Paid (₹)</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="log : ${logs}">
                  <td th:text="${#temporals.format(log.dailyLog.logDate, 'dd MMM yyyy')}">-</td>
                  <td th:text="${log.dailyLog.jobCard.phase}">-</td>
                  <td class="fw-bold text-success" th:text="'₹ ' + ${#numbers.formatDecimal(log.wagePaid, 1, 'COMMA', 2, 'POINT')}">-</td>
                  <td>
                    <a th:href="'/admin/sitelogs/' + ${log.dailyLog.id}" class="btn btn-sm btn-outline-secondary" title="View Daily Log">
                      <i class="bi bi-eye"></i>
                    </a>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(logs)}">
                  <td colspan="4" class="text-center text-muted py-4">No daily logs found for this labour.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
