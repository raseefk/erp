<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Advance Payments')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('advances')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Advance Payments')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-cash-stack text-primary me-2"></i>Advance Payments</h2>
        <a href="/admin/advances/create" class="btn btn-primary" sec:authorize="hasAnyAuthority('ROLE_SYSTEM_ADMIN', 'PERM_ADVANCE_PAYMENTS_CREATE')">
          <i class="bi bi-plus-lg me-1"></i> Collect Advance
        </a>
      </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
          <tr>
            <th class="ps-4">No.</th>
            <th>Date</th>
            <th>Payment From</th>
            <th>Project</th>
            <th>Amount</th>
            <th>Status</th>
            <th class="text-end pe-4">Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="adv : ${advancePage.content}">
            <td class="ps-4 fw-medium text-dark" th:text="${adv.advanceNumber}">ADV-0001</td>
            <td th:text="${#temporals.format(adv.date, 'dd MMM yyyy')}">01 Jan 2024</td>
            <td th:text="${adv.paymentFrom}">Customer Name</td>
            <td>
              <span th:if="${adv.project != null}" th:text="${adv.project.name}">Project Name</span>
              <span th:unless="${adv.project != null}" class="text-muted">-</span>
            </td>
            <td class="fw-bold" th:text="'₹' + ${#numbers.formatDecimal(adv.amount, 1, 'COMMA', 2, 'POINT')}">10,000.00</td>
            <td>
              <span th:if="${adv.status.name() == 'RECEIVED'}" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25">RECEIVED</span>
              <span th:if="${adv.status.name() == 'SETTLED'}" class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25">SETTLED</span>
            </td>
            <td class="text-end pe-4">
              <a th:href="@{/admin/advances/{id}/receipt(id=${adv.id})}" class="btn btn-sm btn-outline-secondary" title="Download Receipt">
                <i class="bi bi-download"></i> Receipt
              </a>
            </td>
          </tr>
          <tr th:if="${advancePage.empty}">
            <td colspan="7" class="text-center py-5 text-muted">
              <i class="bi bi-inbox fs-2 d-block mb-2"></i>
              No advance payments found
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-white border-top-0 py-3" th:if="${advancePage.totalPages > 1}">
      <ul class="pagination pagination-sm mb-0 justify-content-center">
        <li class="page-item" th:classappend="${advancePage.first} ? 'disabled' : ''">
          <a class="page-link" th:href="@{/admin/advances(page=${currentPage - 1})}">Previous</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, advancePage.totalPages - 1)}"
            th:classappend="${currentPage == i} ? 'active' : ''">
          <a class="page-link" th:href="@{/admin/advances(page=${i})}" th:text="${i + 1}">1</a>
        </li>
        <li class="page-item" th:classappend="${advancePage.last} ? 'disabled' : ''">
          <a class="page-link" th:href="@{/admin/advances(page=${currentPage + 1})}">Next</a>
        </li>
      </ul>
    </div>
  </div>
    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
