<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head(${user.id == null ? 'Create User' : 'Edit User'})}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('users')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar(${user.id == null ? 'Create New User' : 'Edit User: ' + user.fullName})}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>

    <div class="mb-3 mt-2">
      <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back to Users</a>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="card card-levanto">
          <div class="card-header"><i class="bi" th:classappend="${user.id == null ? 'bi-person-plus' : 'bi-pencil'}"></i> 
            <span th:text="${user.id == null ? 'User Details' : 'Edit User Details'}"></span>
          </div>
          <div class="card-body">
            <form th:action="${user.id == null ? '/admin/users' : '/admin/users/' + user.id}" th:object="${user}" method="post">
              
              <div class="mb-3">
                <label class="form-label fw-bold">Full Name <span class="text-danger">*</span></label>
                <input type="text" th:field="*{fullName}" class="form-control" required placeholder="John Doe">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="john@example.com">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Username <span class="text-danger">*</span></label>
                <input type="text" th:field="*{username}" class="form-control" required placeholder="johndoe" th:readonly="${user.id != null}">
                <div class="form-text" th:if="${user.id == null}">Must be unique.</div>
                <div class="form-text" th:if="${user.id != null}">Username cannot be changed.</div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold" th:text="${user.id == null ? 'Initial Password *' : 'Change Password (Leave blank to keep current)'}"></label>
                <input type="password" name="newPassword" class="form-control" th:required="${user.id == null}" minlength="6">
                <div class="form-text">Must be at least 6 characters.</div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">Role <span class="text-danger">*</span></label>
                <select name="roleId" class="form-select" required>
                  <option value="" disabled th:selected="${user.id == null}">Select a role...</option>
                  <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}" 
                          th:selected="${user.roles != null and #lists.contains(user.roles.![id], r.id)}"></option>
                </select>
              </div>

              <button type="submit" class="btn btn-navy">
                <i class="bi bi-check-circle me-1"></i>
                <span th:text="${user.id == null ? 'Create User' : 'Update User'}"></span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
