<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('User Management')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('users')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('User Management')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>

    <div class="d-flex justify-content-end mb-3 mt-2">
      <a th:href="@{/admin/users/new}" class="btn btn-navy"><i class="bi bi-person-plus me-1"></i>Create New User</a>
    </div>

    <div class="card card-levanto">
      <div class="card-body p-0 table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Full Name</th>
              <th>Username</th>
              <th>Role</th>
              <th>Status</th>
              <th>Created On</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u : ${users}">
              <td th:text="${u.id}"></td>
              <td th:text="${u.fullName}" class="fw-bold"></td>
              <td th:text="${u.username}"></td>
              <td><span class="badge" th:classappend="${u.role.name() == 'ROLE_ADMIN' ? 'bg-danger' : 'bg-primary'}" th:text="${u.role.name()}"></span></td>
              <td>
                <span class="badge" th:classappend="${u.enabled ? 'bg-success' : 'bg-secondary'}" th:text="${u.enabled ? 'Active' : 'Disabled'}"></span>
              </td>
              <td th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}"></td>
              <td class="text-end">
                <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" class="d-inline">
                  <button type="submit" class="btn btn-sm" th:classappend="${u.enabled ? 'btn-outline-danger' : 'btn-outline-success'}">
                    <i class="bi" th:classappend="${u.enabled ? 'bi-lock' : 'bi-unlock'}"></i>
                    <span th:text="${u.enabled ? 'Disable' : 'Enable'}"></span>
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
