<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(pageTitle='BOQ Management')}"></head>
<body class="bg-light">
    <th:block th:replace="~{fragments/layout :: sidebar(activePage='boq')}"></th:block>
    <div id="main">
        <div th:replace="~{fragments/layout :: topbar(pageTitle='BOQ Management')}"></div>
        <div class="pb">
            <th:block th:replace="~{fragments/layout :: alerts}"></th:block>

            <div class="mb-3 d-flex justify-content-between align-items-center">
                <form action="/admin/construction/boq" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control form-control-sm" style="width:220px;" placeholder="Search BOQs...">
                    <button type="submit" class="btn btn-sm btn-gold">Search</button>
                </form>
                <button th:if="${#authorization.expression('hasAuthority(''PERM_CONSTRUCTION_BOQ_MANAGE'') or hasRole(''SYSTEM_ADMIN'')')}" 
                        class="btn btn-sm btn-gold" data-bs-toggle="modal" data-bs-target="#newBoqModal">
                    <i class="bi bi-plus-lg me-1"></i> New BOQ
                </button>
            </div>

            <div class="card card-lv mb-4">
                <div class="card-header">BOQ Management</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-lv table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>BOQ Number</th>
                                    <th>Title</th>
                                    <th>Project</th>
                                    <th>Status</th>
                                    <th>Created Date</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="boq : ${boqsPage.content}">
                                    <td>
                                        <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 font-monospace" th:text="${boq.boqNumber}">BOQ-001</span>
                                    </td>
                                    <td class="fw-bold text-dark" th:text="${boq.title}">Main Building Civil</td>
                                    <td>
                                        <a th:href="@{/admin/projects/{id}(id=${boq.project.id})}" class="text-decoration-none" th:text="${boq.project.name}">Project A</a>
                                    </td>
                                    <td>
                                        <span class="badge rounded-pill" 
                                              th:classappend="${boq.status.name() == 'APPROVED' ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25' : 
                                                             (boq.status.name() == 'DRAFT' ? 'bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25' : 'bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25')}"
                                              th:text="${boq.status}">DRAFT</span>
                                    </td>
                                    <td th:text="${#temporals.format(boq.createdAt, 'dd MMM yyyy')}">Date</td>
                                    <td class="text-end">
                                        <a th:href="@{/admin/construction/boq/{id}(id=${boq.id})}" class="btn btn-sm btn-navy">
                                            <i class="bi bi-eye"></i> View
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${boqsPage.empty}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="bi bi-inbox fs-1 d-block mb-3 text-secondary opacity-50"></i>
                                        <p class="mb-0 fs-5">No BOQs found.</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${boqsPage.totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${boqsPage.first ? 'disabled' : ''}">
                                <a class="page-link shadow-sm rounded-start-pill" th:href="@{/admin/construction/boq(page=${boqsPage.number - 1}, search=${search})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, boqsPage.totalPages - 1)}" th:classappend="${boqsPage.number == i ? 'active' : ''}">
                                <a class="page-link shadow-sm" th:href="@{/admin/construction/boq(page=${i}, search=${search})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${boqsPage.last ? 'disabled' : ''}">
                                <a class="page-link shadow-sm rounded-end-pill" th:href="@{/admin/construction/boq(page=${boqsPage.number + 1}, search=${search})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- New BOQ Modal -->
    <div class="modal fade" id="newBoqModal" tabindex="-1">
        <div class="modal-dialog">
            <form th:action="@{/admin/construction/boq}" method="post" th:object="${newBoq}" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Create New BOQ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Project <span class="text-danger">*</span></label>
                        <select name="projectId" class="form-select" required>
                            <option value="">-- Select Project --</option>
                            <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">BOQ Number <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{boqNumber}" class="form-control" required placeholder="e.g. BOQ-2026-01">
                        <div class="form-text">Must be unique per project.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Title <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{title}" class="form-control" required placeholder="e.g. Phase 1 Civil Works">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-gold">Create BOQ</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
