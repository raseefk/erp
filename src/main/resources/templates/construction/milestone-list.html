<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(pageTitle='Project Milestones')}"></head>
<body class="bg-light">
    <th:block th:replace="~{fragments/layout :: sidebar(activePage='milestones')}"></th:block>
    <div id="main">
        <div th:replace="~{fragments/layout :: topbar(pageTitle='Project Milestones')}"></div>
        <div class="pb">
            <th:block th:replace="~{fragments/layout :: alerts}"></th:block>

            <div class="mb-3 d-flex justify-content-between align-items-center">
                <form action="/admin/construction/milestones" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control form-control-sm" style="width:220px;" placeholder="Search milestones...">
                    <button type="submit" class="btn btn-sm btn-gold">Search</button>
                </form>
                <button th:if="${#authorization.expression('hasAuthority(''PERM_CONSTRUCTION_MILESTONE_APPROVE'') or hasRole(''SYSTEM_ADMIN'')')}" 
                        class="btn btn-sm btn-gold" data-bs-toggle="modal" data-bs-target="#newMilestoneModal">
                    <i class="bi bi-plus-lg me-1"></i> Add Milestone
                </button>
            </div>

            <div class="card card-lv mb-4">
                <div class="card-header">Project Milestones</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-lv table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Project</th>
                                    <th>Milestone Name</th>
                                    <th>Target Date</th>
                                    <th class="text-end">Payment %</th>
                                    <th>Status</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="ms : ${milestonesPage.content}">
                                    <td>
                                        <a th:href="@{/admin/projects/{id}(id=${ms.project.id})}" class="text-decoration-none fw-bold text-dark" th:text="${ms.project.name}">Project A</a>
                                    </td>
                                    <td>
                                        <div class="fw-bold" th:text="${ms.name}">Foundation Completed</div>
                                        <small class="text-muted" th:text="${ms.description}">...</small>
                                    </td>
                                    <td th:text="${#temporals.format(ms.dueDate, 'dd MMM yyyy')}">Date</td>
                                    <td class="text-end fw-medium" th:text="${#numbers.formatDecimal(ms.releasePercent, 1, 2) + '%'}">10%</td>
                                    <td>
                                        <span class="badge rounded-pill" 
                                              th:classappend="${ms.status.name() == 'PAYMENT_RELEASED' ? 'bg-success bg-opacity-10 text-success' : 
                                                             (ms.status.name() == 'CLIENT_APPROVED' ? 'bg-info bg-opacity-10 text-info' : 
                                                             (ms.status.name() == 'SUBMITTED' ? 'bg-primary bg-opacity-10 text-primary' : 'bg-secondary bg-opacity-10 text-secondary'))}"
                                              th:text="${ms.status}">PLANNED</span>
                                    </td>
                                    <td class="text-end">
                                        <!-- Actions Based on Status -->
                                        <form th:if="${ms.status.name() == 'PLANNED' and (#authorization.expression('hasAuthority(''PERM_CONSTRUCTION_MILESTONE_APPROVE'') or hasRole(''SYSTEM_ADMIN'')'))}" 
                                              th:action="@{/admin/construction/milestones/{id}/submit(id=${ms.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-navy" title="Submit to Client">
                                                Submit
                                            </button>
                                        </form>

                                        <button th:if="${ms.status.name() == 'SUBMITTED' and (#authorization.expression('hasAuthority(''PERM_CONSTRUCTION_MILESTONE_APPROVE'') or hasRole(''SYSTEM_ADMIN'')'))}" 
                                                class="btn btn-sm btn-gold" data-bs-toggle="modal" th:data-bs-target="'#approveModal' + ${ms.id}">
                                            Approve
                                        </button>

                                        <form th:if="${ms.status.name() == 'CLIENT_APPROVED' and (#authorization.expression('hasAuthority(''PERM_CONSTRUCTION_MILESTONE_PAYMENT_RELEASE'') or hasRole(''SYSTEM_ADMIN'')'))}" 
                                              th:action="@{/admin/construction/milestones/{id}/release(id=${ms.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-success" onclick="return confirm('Authorize payment release?');">
                                                Release
                                            </button>
                                        </form>

                                        <span th:if="${ms.status.name() == 'PAYMENT_RELEASED'}">
                                            <i class="bi bi-check-all text-success fs-5" title="Payment Released"></i>
                                        </span>

                                        <!-- Client Approval Modal -->
                                        <div th:if="${ms.status.name() == 'SUBMITTED'}" class="modal fade text-start" th:id="'approveModal' + ${ms.id}" tabindex="-1">
                                            <div class="modal-dialog">
                                                <form th:action="@{/admin/construction/milestones/{id}/approve(id=${ms.id})}" method="post" class="modal-content">
                                                    <div class="modal-header">
                                                        <h5 class="modal-title fw-bold">Client Approval</h5>
                                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                    </div>
                                                    <div class="modal-body p-4">
                                                        <div class="mb-3">
                                                            <label class="form-label">Client Approval Reference <span class="text-danger">*</span></label>
                                                            <input type="text" name="reference" class="form-control" required placeholder="e.g. Email from client on DD/MM">
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                                                        <button type="submit" class="btn btn-sm btn-gold">Save Approval</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>

                                    </td>
                                </tr>
                                <tr th:if="${milestonesPage.empty}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="bi bi-flag fs-1 d-block mb-3 text-secondary opacity-50"></i>
                                        <p class="mb-0 fs-5">No milestones found.</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${milestonesPage.totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${milestonesPage.first ? 'disabled' : ''}">
                                <a class="page-link shadow-sm rounded-start-pill" th:href="@{/admin/construction/milestones(page=${milestonesPage.number - 1}, search=${search})}">Previous</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, milestonesPage.totalPages - 1)}" th:classappend="${milestonesPage.number == i ? 'active' : ''}">
                                <a class="page-link shadow-sm" th:href="@{/admin/construction/milestones(page=${i}, search=${search})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${milestonesPage.last ? 'disabled' : ''}">
                                <a class="page-link shadow-sm rounded-end-pill" th:href="@{/admin/construction/milestones(page=${milestonesPage.number + 1}, search=${search})}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- New Milestone Modal -->
    <div class="modal fade" id="newMilestoneModal" tabindex="-1">
        <div class="modal-dialog">
            <form th:action="@{/admin/construction/milestones}" method="post" th:object="${newMilestone}" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Create Milestone</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Project <span class="text-danger">*</span></label>
                        <select name="projectId" class="form-select" required>
                            <option value="">-- Select Project --</option>
                            <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Milestone Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control" required placeholder="e.g. Roof Slab Casting">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label fw-medium">Target Date <span class="text-danger">*</span></label>
                            <input type="date" th:field="*{dueDate}" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-medium">Payment % <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" step="0.01" th:field="*{releasePercent}" class="form-control" required>
                                <span class="input-group-text">%</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-gold">Create Milestone</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
