<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('New PO')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('scm-po')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Purchase Order')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">
      <div class="mb-3">
        <a th:href="@{/admin/scm/po}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back to List</a>
      </div>
      
      <div class="card card-levanto">
        <div class="card-header"><i class="bi bi-file-earmark-plus me-2"></i>Purchase Order Details</div>
        <div class="card-body">
          <form th:action="@{/admin/scm/po/save}" method="post" id="poForm">
            <input type="hidden" name="id" th:value="${po.id}"/>
            
            <div class="row g-3 mb-4">
              <div class="col-md-3">
                <label class="form-label fw-bold">PO Number</label>
                <input type="text" name="poNumber" class="form-control" th:value="${po.poNumber}" readonly/>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">Vendor *</label>
                <select name="vendor.id" class="form-select" required>
                  <option value="">-- Select Vendor --</option>
                  <option th:each="v : ${vendors}" th:value="${v.id}" th:text="${v.name}" th:selected="${po.vendor?.id == v.id}"></option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">Order Date</label>
                <input type="date" name="orderDate" class="form-control" th:value="${po.orderDate ?: #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">Expected Delivery</label>
                <input type="date" name="expectedDeliveryDate" class="form-control" th:value="${po.expectedDeliveryDate}"/>
              </div>
            </div>

            <h6 class="text-navy fw-bold border-bottom pb-1 mb-3"><i class="bi bi-list-check me-2"></i>Order Items</h6>
            <div class="table-responsive">
              <table class="table table-sm table-bordered" id="itemsTable">
                <thead class="bg-light">
                  <tr>
                    <th style="width:30%;">Inventory Item</th>
                    <th>Description</th>
                    <th style="width:10%;">Qty</th>
                    <th style="width:10%;">Unit</th>
                    <th style="width:15%;">Unit Price (₹)</th>
                    <th style="width:5%;"></th>
                  </tr>
                </thead>
                <tbody id="itemsBody">
                  <tr th:each="item, stat : ${po.items}">
                    <td>
                      <select th:name="'items[' + ${stat.index} + '].inventoryItem.id'" class="form-select form-select-sm" onchange="updateRowUnit(this)">
                        <option value="">-- Custom --</option>
                        <option th:each="inv : ${inventoryItems}" th:value="${inv.id}" th:text="${inv.name}" th:selected="${item.inventoryItem?.id == inv.id}" th:data-unit="${inv.unit}"></option>
                      </select>
                    </td>
                    <td><input type="text" th:name="'items[' + ${stat.index} + '].description'" class="form-control form-control-sm" th:value="${item.description}" required/></td>
                    <td><input type="number" step="0.001" th:name="'items[' + ${stat.index} + '].quantity'" class="form-control form-control-sm" th:value="${item.quantity}" required/></td>
                    <td><input type="text" th:name="'items[' + ${stat.index} + '].unit'" class="form-control form-control-sm" th:value="${item.unit ?: 'NOS'}"/></td>
                    <td><input type="number" step="0.01" th:name="'items[' + ${stat.index} + '].unitPrice'" class="form-control form-control-sm" th:value="${item.unitPrice}" required/></td>
                    <td class="text-center"><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)"><i class="bi bi-trash"></i></button></td>
                  </tr>
                  <tr th:if="${#lists.isEmpty(po.items)}">
                    <td>
                      <select name="items[0].inventoryItem.id" class="form-select form-select-sm" onchange="updateRowUnit(this)">
                        <option value="">-- Custom --</option>
                        <option th:each="inv : ${inventoryItems}" th:value="${inv.id}" th:text="${inv.name}" th:data-unit="${inv.unit}"></option>
                      </select>
                    </td>
                    <td><input type="text" name="items[0].description" class="form-control form-control-sm" required/></td>
                    <td><input type="number" step="0.001" name="items[0].quantity" class="form-control form-control-sm" value="1" required/></td>
                    <td><input type="text" name="items[0].unit" class="form-control form-control-sm" value="NOS"/></td>
                    <td><input type="number" step="0.01" name="items[0].unitPrice" class="form-control form-control-sm" value="0.00" required/></td>
                    <td class="text-center"><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)"><i class="bi bi-trash"></i></button></td>
                  </tr>
                </tbody>
              </table>
              <button type="button" class="btn btn-sm btn-outline-navy mt-2" onclick="addRow()"><i class="bi bi-plus-lg me-1"></i>Add Item</button>
            </div>

            <div class="mt-4">
              <label class="form-label fw-bold">Internal Notes</label>
              <textarea name="notes" class="form-control" rows="3" th:text="${po.notes}" placeholder="Optional instructions for inventory team..."></textarea>
            </div>

            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-gold px-4">Save PO Draft</button>
              <a th:href="@{/admin/scm/po}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
<script th:inline="javascript">
  let rowCount = [[${#lists.size(po.items) > 0 ? #lists.size(po.items) : 1}]];
  
  function addRow() {
    const tbody = document.getElementById('itemsBody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <select name="items[${rowCount}].inventoryItem.id" class="form-select form-select-sm" onchange="updateRowUnit(this)">
          <option value="">-- Custom --</option>
          ${[[${inventoryItems}]].map(i => `<option value="${i.id}" data-unit="${i.unit}">${i.name}</option>`).join('')}
        </select>
      </td>
      <td><input type="text" name="items[${rowCount}].description" class="form-control form-control-sm" required/></td>
      <td><input type="number" step="0.001" name="items[${rowCount}].quantity" class="form-control form-control-sm" value="1" required/></td>
      <td><input type="text" name="items[${rowCount}].unit" class="form-control form-control-sm" value="NOS"/></td>
      <td><input type="number" step="0.01" name="items[${rowCount}].unitPrice" class="form-control form-control-sm" value="0.00" required/></td>
      <td class="text-center"><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)"><i class="bi bi-trash"></i></button></td>
    `;
    tbody.appendChild(tr);
    rowCount++;
  }

  function removeRow(btn) {
    if (document.querySelectorAll('#itemsBody tr').length > 1) {
      btn.closest('tr').remove();
    }
  }

  function updateRowUnit(select) {
    const opt = select.options[select.selectedIndex];
    const unit = opt.dataset.unit || 'NOS';
    const row = select.closest('tr');
    row.querySelector('input[name*="unit"]').value = unit;
    if (!row.querySelector('input[name*="description"]').value) {
      row.querySelector('input[name*="description"]').value = opt.text === '-- Custom --' ? '' : opt.text;
    }
  }
</script>
</body>
</html>
