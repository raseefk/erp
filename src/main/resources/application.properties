# ── Server ────────────────────────────────────────────────────────────────────
server.port=8085
spring.application.name=super-erp

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/super_erp
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=erp_app
spring.datasource.password=SuperErp@2026!

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Liquibase ─────────────────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.enabled=true
spring.liquibase.default-schema=public

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Session ───────────────────────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Multipart ─────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── JWT Configuration ─────────────────────────────────────────────────────────
app.jwt.secret=super-erp-jwt-secret-key-must-be-256-bits-long-for-hs256-algorithm
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── Caffeine Cache ────────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=600s

# ── Multi-Tenant ──────────────────────────────────────────────────────────────
app.tenant.domain=erp.com
app.tenant.subdomain-enabled=true
app.tenant.header-fallback=X-Tenant-ID

# ── System Admin ──────────────────────────────────────────────────────────────
app.system.admin.username=superadmin
app.system.admin.password=SuperAdmin@2026!
app.system.admin.email=admin@supererp.com

# ── Company Branding defaults ─────────────────────────────────────────────────
app.company.name=Super ERP
app.company.tagline=Enterprise Resource Planning Simplified
app.company.phone=+91 XXXXX XXXXX
app.company.email=info@supererp.com
app.company.website=www.supererp.com
app.company.gstNumber=YOUR_GSTIN_HERE
app.company.cgstRate=9
app.company.sgstRate=9

# ── File Upload ───────────────────────────────────────────────────────────────
app.upload.dir=./uploads
