<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Lēvanto Flooring</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --navy:#1A3A5C; --navy-deep:#0F2338; --gold:#C8972A; --gold-lt:#E5B84A; }
    body { font-family:'Jost',sans-serif; background:var(--navy-deep); min-height:100vh;
           display:flex; align-items:center; justify-content:center;
           background-image: linear-gradient(rgba(200,151,42,.04) 1px,transparent 1px),
                             linear-gradient(90deg,rgba(200,151,42,.04) 1px,transparent 1px);
           background-size:60px 60px; }
    .login-card { background:var(--navy); border:1px solid rgba(200,151,42,.2);
                  border-radius:4px; padding:2.8rem 2.4rem; width:100%; max-width:420px;
                  box-shadow:0 24px 60px rgba(0,0,0,.5); }
    .brand-name { font-family:'Cormorant Garamond',serif; font-size:1.9rem; font-weight:700;
                  color:#fff; letter-spacing:.04em; }
    .brand-name span { color:var(--gold); }
    .brand-sub  { font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:#7A9FBF; }
    .form-label { font-size:.65rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); font-weight:600; }
    .form-control { background:rgba(255,255,255,.05); border:1px solid rgba(200,151,42,.2);
                    color:#fff; border-radius:2px; padding:.8rem 1rem; font-family:'Jost',sans-serif; }
    .form-control:focus { background:rgba(255,255,255,.08); border-color:var(--gold);
                          box-shadow:none; color:#fff; }
    .form-control::placeholder { color:rgba(255,255,255,.2); }
    .btn-login { background:var(--gold); color:var(--navy-deep); border:none; font-weight:700;
                 letter-spacing:.1em; text-transform:uppercase; padding:.85rem; font-size:.85rem;
                 width:100%; transition:background .2s; border-radius:2px; }
    .btn-login:hover { background:var(--gold-lt); color:var(--navy-deep); }
    .alert-err { background:rgba(220,38,38,.15); border:1px solid rgba(220,38,38,.3);
                 color:#fca5a5; border-radius:2px; font-size:.85rem; }
    .alert-ok  { background:rgba(22,163,74,.12); border:1px solid rgba(22,163,74,.3);
                 color:#86efac; border-radius:2px; font-size:.85rem; }
    .divider   { border-top:1px solid rgba(200,151,42,.15); margin:1.4rem 0; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <img src="/images/logo-vertical.jpg" alt="Lēvanto Flooring"
         class="mb-3" style="height:110px;width:auto;object-fit:contain;border-radius:4px;"/>
    <div class="brand-sub mt-1">Management Portal</div>
  </div>

  <div th:if="${errorMsg}"   class="alert-err p-3 mb-3"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span></div>
  <div th:if="${logoutMsg}"  class="alert-ok  p-3 mb-3"><i class="bi bi-check-circle me-2"></i><span th:text="${logoutMsg}"></span></div>
  <div th:if="${expiredMsg}" class="alert-err p-3 mb-3"><i class="bi bi-clock me-2"></i><span th:text="${expiredMsg}"></span></div>

  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required/>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
    </div>
    <button type="submit" class="btn-login">Login →</button>
  </form>

  <div class="divider"></div>
  <div class="text-center" style="font-size:.75rem;color:#7A9FBF;">
    <a href="/" style="color:#C8972A;text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Back to Website</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
