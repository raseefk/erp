<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Add Expense')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('expenses')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Add Expense')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">
      <div class="mb-3"><a href="/admin/expenses" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
      <div class="card card-lv" style="max-width:580px;">
        <div class="card-header"><i class="bi bi-wallet2 me-2"></i>Add Expense</div>
        <div class="card-body">
          <!-- multipart/form-data required for file upload -->
          <form action="/admin/expenses/save" method="post" enctype="multipart/form-data">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Category <span class="text-danger">*</span></label>
                <select name="category" class="form-select" required>
                  <option value="">-- Select --</option>
                  <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Amount ₹ <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="amount" class="form-control" required placeholder="0.00"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Date <span class="text-danger">*</span></label>
                <input type="date" name="expenseDate" class="form-control" required
                       th:value="${#temporals.format(#temporals.createNow(),'yyyy-MM-dd')}"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Reference</label>
                <input type="text" name="reference" class="form-control" placeholder="e.g. Vendor / Shop name"/>
              </div>
              <div class="col-12">
                <label class="form-label fw-bold">Description <span class="text-danger">*</span></label>
                <input type="text" name="description" class="form-control" required placeholder="Brief description of the expense"/>
              </div>

              <!-- File attachment -->
              <div class="col-12">
                <label class="form-label fw-bold">
                  <i class="bi bi-paperclip me-1"></i>Attach Receipt / Bill
                </label>
                <input type="file" name="file" id="fileInput" class="form-control"
                       accept=".pdf,.jpg,.jpeg,.png,.webp"
                       onchange="previewFile(this)"/>
                <small class="text-muted">Accepted: PDF, JPG, PNG, WEBP — Max 10 MB</small>

                <!-- Preview area -->
                <div id="filePreview" style="display:none;margin-top:.75rem;">
                  <div class="p-3 rounded d-flex align-items-center gap-3"
                       style="background:#f0f4f8;border:1px dashed #cbd5e1;">
                    <div id="fileIconArea" style="font-size:2rem;color:#C8972A;"></div>
                    <div>
                      <div id="fileName" class="fw-bold small">-</div>
                      <div id="fileSize" class="text-muted" style="font-size:.75rem;">-</div>
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-danger ms-auto" onclick="clearFile()">
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </div>
                  <!-- Image preview -->
                  <img id="imgPreview" src="" alt="Preview"
                       style="display:none;max-width:100%;max-height:220px;margin-top:.5rem;border-radius:4px;"/>
                </div>
              </div>

              <div class="col-12 d-flex gap-2 pt-2">
                <button type="submit" class="btn btn-gold fw-bold"><i class="bi bi-check-lg me-1"></i>Save Expense</button>
                <a href="/admin/expenses" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
<script>
function previewFile(input) {
  const file = input.files[0];
  if (!file) return;
  const preview  = document.getElementById('filePreview');
  const nameEl   = document.getElementById('fileName');
  const sizeEl   = document.getElementById('fileSize');
  const iconArea = document.getElementById('fileIconArea');
  const imgPrev  = document.getElementById('imgPreview');

  preview.style.display = 'block';
  nameEl.textContent = file.name;
  sizeEl.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';

  if (file.type === 'application/pdf') {
    iconArea.innerHTML = '<i class="bi bi-file-pdf-fill" style="color:#dc2626;"></i>';
    imgPrev.style.display = 'none';
  } else if (file.type.startsWith('image/')) {
    iconArea.innerHTML = '<i class="bi bi-image-fill" style="color:#C8972A;"></i>';
    const reader = new FileReader();
    reader.onload = e => { imgPrev.src = e.target.result; imgPrev.style.display = 'block'; };
    reader.readAsDataURL(file);
  }
}

function clearFile() {
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').style.display = 'none';
  document.getElementById('imgPreview').style.display  = 'none';
}
</script>
</body>
</html>
