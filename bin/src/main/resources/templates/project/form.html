<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Project Form')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('projects')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Project Details')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">
      <div class="mb-3">
        <a href="/admin/projects" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Back to Projects
        </a>
      </div>
      <div class="card card-lv" style="max-width:680px;">
        <div class="card-header">
          <i class="bi bi-kanban me-2"></i>
          <span th:text="${project.id != null ? 'Edit Project' : 'New Project'}">Project</span>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/projects/save}" method="post">
            <input type="hidden" name="id" th:value="${project.id}"/>
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-bold">Project Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control"
                       th:value="${project.name}" required
                       placeholder="e.g. Capkon City Flooring — Phase 1"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Client Name</label>
                <input type="text" name="clientName" class="form-control"
                       th:value="${project.clientName}" placeholder="Client / Developer name"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Location</label>
                <input type="text" name="location" class="form-control"
                       th:value="${project.location}" placeholder="Site address"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Total Contract Value ₹</label>
                <input type="number" step="0.01" min="0" name="totalContractValue"
                       class="form-control"
                       th:value="${project.totalContractValue}" placeholder="0.00"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Status</label>
                <select name="status" class="form-select">
                  <option th:each="s : ${ProjectStatus}" th:value="${s}" th:text="${s}"
                          th:selected="${s == project.status}"></option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Start Date</label>
                <input type="date" name="startDate" class="form-control"
                       th:value="${project.startDate}"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">End Date</label>
                <input type="date" name="endDate" class="form-control"
                       th:value="${project.endDate}"/>
              </div>
              <div class="col-12">
                <label class="form-label fw-bold">Description</label>
                <textarea name="description" class="form-control" rows="3"
                          th:text="${project.description}"
                          placeholder="Scope of work, notes…"></textarea>
              </div>
              <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-gold fw-bold">
                  <i class="bi bi-check-lg me-1"></i>Save Project
                </button>
                <a href="/admin/projects" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
