<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Daily Logs')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('sitelogs')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Daily Logs')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">

      <!-- Back + New log -->
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
          <a th:href="'/admin/projects/'+${project.id}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i><span th:text="${project.name}">Project</span>
          </a>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="badge badge-navy" th:text="${jobCard.phase}">Phase</span>
          <a th:href="'/admin/sitelogs/new?jobCardId='+${jobCard.id}" class="btn btn-sm btn-gold">
            <i class="bi bi-plus-lg me-1"></i>New Log
          </a>
        </div>
      </div>

      <div class="card card-lv">
        <div class="card-header">
          <i class="bi bi-journal-text me-2"></i>Daily Logs
          <small class="text-muted ms-2" th:text="${project.name}+' → '+${jobCard.phase}">-</small>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-lv mb-0">
              <thead>
                <tr>
                  <th>Date</th><th>Progress</th><th>Work Value ₹</th>
                  <th>Labours</th><th>Labour Cost ₹</th><th>Expenses</th><th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="l : ${logs}">
                  <td>
                    <strong th:text="${#temporals.format(l.logDate,'dd MMM yyyy')}">-</strong>
                  </td>
                  <td>
                    <span th:text="${l.progressDescription != null
                                     ? #strings.abbreviate(l.progressDescription, 60) : '—'}">-</span>
                  </td>
                  <td class="text-success fw-bold"
                      th:text="'₹ '+${#numbers.formatDecimal(l.workValue,1,'COMMA',2,'POINT')}">-</td>
                  <td th:text="${l.numberOfLabours}">0</td>
                  <td class="text-danger fw-bold"
                      th:text="'₹ '+${#numbers.formatDecimal(l.totalLabourCost,1,'COMMA',2,'POINT')}">-</td>
                  <td>
                    <span class="badge badge-warn" th:text="${#lists.size(l.projectExpenses)}+' item(s)'">0</span>
                  </td>
                  <td>
                    <div class="btn-group btn-group-sm">
                      <a th:href="'/admin/sitelogs/'+${l.id}" class="btn btn-navy">
                        <i class="bi bi-eye"></i>
                      </a>
                      <button class="btn btn-outline-danger"
                              th:onclick="'delLog('+${l.id}+','+${jobCard.id}+')'">
                        <i class="bi bi-trash"></i>
                      </button>
                    </div>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(logs)}">
                  <td colspan="7" class="text-center text-muted py-5">
                    <i class="bi bi-journal" style="font-size:2rem;display:block;margin-bottom:.5rem;"></i>
                    No logs yet.
                    <a th:href="'/admin/sitelogs/new?jobCardId='+${jobCard.id}"
                       style="color:#C8972A;">Add the first log →</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
<script>
function delLog(id, jcId) {
  if (!confirm('Delete this log and all NEW expenses?')) return;
  fetch('/admin/sitelogs/'+id, {method:'DELETE'})
    .then(r=>r.json()).then(d=>{
      if (d.success) location.reload(); else alert(d.message);
    });
}
</script>
</body>
</html>
