<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Daily Logs')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('sitelogs')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Daily Logs')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-bold mb-0" style="color:#6b8099;">Select a project to view or add daily logs</h6>
        <a href="/admin/projects/new" class="btn btn-sm btn-gold">
          <i class="bi bi-plus-lg me-1"></i>New Project
        </a>
      </div>

      <div class="row g-3" th:if="${not #lists.isEmpty(projectList)}">
        <div class="col-md-6 col-xl-4" th:each="p : ${projectList}">
          <div class="card card-lv h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span class="fw-bold" style="font-size:.95rem;" th:text="${p.name}">-</span>
              <span class="badge" style="background:#16a34a;color:#fff;">ACTIVE</span>
            </div>
            <div class="card-body">
              <div class="mb-1">
                <i class="bi bi-person me-1" style="color:#C8972A;"></i>
                <span class="text-muted small" th:text="${p.clientName ?: '—'}">-</span>
              </div>
              <div class="mb-3">
                <i class="bi bi-geo-alt me-1" style="color:#C8972A;"></i>
                <span class="text-muted small" th:text="${p.location ?: '—'}">-</span>
              </div>
              <small class="fw-bold" style="color:#C8972A;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;">Job Cards</small>
              <div class="mt-1 d-flex flex-column gap-2" th:if="${not #lists.isEmpty(p.jobCards)}">
                <div th:each="jc : ${p.jobCards}"
                     class="d-flex align-items-center justify-content-between p-2 rounded"
                     style="background:#f0f4f8;border:1px solid #e2e8f0;">
                  <div>
                    <span class="fw-bold small" th:text="${jc.phase}">-</span>
                    <span class="badge ms-1"
                          th:text="${jc.status}"
                          th:style="${jc.status.name()=='IN_PROGRESS'}?'background:#2563eb;color:#fff;font-size:.6rem;':
                                     (${jc.status.name()=='COMPLETED'}?'background:#16a34a;color:#fff;font-size:.6rem;':
                                     'background:#6b7280;color:#fff;font-size:.6rem;')">
                    </span>
                  </div>
                  <div class="btn-group btn-group-sm">
                    <a th:href="'/admin/sitelogs/jobcard/'+${jc.id}" class="btn btn-navy" title="View logs">
                      <i class="bi bi-journal-text"></i>
                    </a>
                    <a th:href="'/admin/sitelogs/new?jobCardId='+${jc.id}" class="btn btn-gold" title="Add log">
                      <i class="bi bi-plus-lg"></i>
                    </a>
                  </div>
                </div>
              </div>
              <div th:if="${#lists.isEmpty(p.jobCards)}" class="text-muted small mt-2">
                No job cards.
                <a th:href="'/admin/projects/'+${p.id}+'/jobcards/new'" style="color:#C8972A;">Add one →</a>
              </div>
            </div>
            <div class="card-footer bg-white border-0 pt-0">
              <a th:href="'/admin/projects/'+${p.id}" class="btn btn-sm btn-outline-secondary w-100">
                <i class="bi bi-eye me-1"></i>View Full Project
              </a>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(projectList)}" class="card card-lv">
        <div class="card-body text-center py-5">
          <i class="bi bi-kanban" style="font-size:3rem;color:#C8972A;display:block;margin-bottom:.8rem;"></i>
          <h5 class="fw-bold">No active projects</h5>
          <p class="text-muted">Create a project first, then add job cards and daily logs.</p>
          <a href="/admin/projects/new" class="btn btn-gold"><i class="bi bi-plus-lg me-1"></i>Create Project</a>
        </div>
      </div>

    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
