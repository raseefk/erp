<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Income Ledger')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('payments')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Income Ledger')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">

      <!-- Date filter + summary stat -->
      <div class="d-flex justify-content-between align-items-end mb-3 flex-wrap gap-2">
        <form action="/admin/payments" method="get" class="d-flex gap-2 flex-wrap align-items-end">
          <div>
            <label class="form-label mb-1" style="font-size:.72rem;color:#6b8099;text-transform:uppercase;letter-spacing:.08em;">From</label>
            <input type="date" name="from" class="form-control form-control-sm" th:value="${from}"/>
          </div>
          <div>
            <label class="form-label mb-1" style="font-size:.72rem;color:#6b8099;text-transform:uppercase;letter-spacing:.08em;">To</label>
            <input type="date" name="to" class="form-control form-control-sm" th:value="${to}"/>
          </div>
          <button type="submit" class="btn btn-sm btn-gold">Apply</button>
          <a href="/admin/payments" class="btn btn-sm btn-outline-secondary">Reset</a>
        </form>
        <div class="stat-card" style="min-width:220px;">
          <div class="stat-icon" style="background:#dcfce7;color:#16a34a;"><i class="bi bi-currency-rupee"></i></div>
          <div>
            <div class="stat-num text-success"
                 th:text="'₹ '+${#numbers.formatDecimal(totalIncome,1,'COMMA',2,'POINT')}">₹0</div>
            <div class="stat-lbl">Total Received</div>
          </div>
        </div>
      </div>

      <div class="card card-lv">
        <div class="card-header"><i class="bi bi-journal-check me-2"></i>Payment Receipts</div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-lv mb-0">
              <thead>
                <tr>
                  <th>#</th><th>Date</th><th>Invoice #</th><th>Customer</th>
                  <th>Title</th><th>Amount ₹</th><th>Description</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="inc, idx : ${ledgerPage.content}">
                  <td th:text="${idx.count}">1</td>
                  <td><small th:text="${#temporals.format(inc.date,'dd MMM yyyy')}">-</small></td>
                  <td>
                    <a th:href="'/admin/billing/'+${inc.transaction.id}"
                       th:text="${inc.inventoryNumber}" style="color:#C8972A;font-weight:600;">-</a>
                  </td>
                  <td th:text="${inc.transaction.customer.name}">-</td>
                  <td>
                    <span class="badge"
                          th:text="${inc.title}"
                          th:classappend="${inc.title.contains('Full')}?' badge-success':' badge-warn'">-</span>
                  </td>
                  <td class="fw-bold text-success"
                      th:text="'₹ '+${#numbers.formatDecimal(inc.amount,1,'COMMA',2,'POINT')}">-</td>
                  <td><small class="text-muted" th:text="${inc.description}">-</small></td>
                </tr>
                <tr th:if="${ledgerPage.totalElements==0}">
                  <td colspan="7" class="text-center text-muted py-4">No payment records for this period.</td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- Pagination -->
          <div class="d-flex justify-content-between align-items-center px-3 py-2"
               th:if="${ledgerPage.totalPages > 1}">
            <small class="text-muted"
                   th:text="'Page '+(${currentPage}+1)+' of '+${ledgerPage.totalPages}"></small>
            <div class="btn-group btn-group-sm">
              <a th:if="${currentPage > 0}"
                 th:href="'/admin/payments?page='+(${currentPage}-1)+'&amp;from='+${from}+'&amp;to='+${to}"
                 class="btn btn-outline-secondary">‹ Prev</a>
              <a th:if="${currentPage < ledgerPage.totalPages-1}"
                 th:href="'/admin/payments?page='+(${currentPage}+1)+'&amp;from='+${from}+'&amp;to='+${to}"
                 class="btn btn-outline-secondary">Next ›</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
