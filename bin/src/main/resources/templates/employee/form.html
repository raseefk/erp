<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Employee')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('employees')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Employee')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">
<div class="mb-3"><a th:href="@{/admin/employees}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="card card-levanto" style="max-width:620px;">
  <div class="card-header"><i class="bi bi-person-badge me-2"></i><span th:text="${employee.id != null ? 'Edit Employee' : 'New Employee'}">Employee</span></div>
  <div class="card-body">
    <form th:action="@{/admin/employees/save}" method="post">
      <input type="hidden" name="id" th:value="${employee.id}"/>
      <input type="hidden" name="active" th:value="${employee.active != null ? employee.active : true}"/>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label fw-bold">Full Name *</label><input type="text" name="name" class="form-control" th:value="${employee.name}" required/></div>
        <div class="col-md-6"><label class="form-label fw-bold">Designation</label><input type="text" name="designation" class="form-control" th:value="${employee.designation}" placeholder="e.g. Site Supervisor"/></div>
        <div class="col-md-6"><label class="form-label fw-bold">Phone</label><input type="text" name="phone" class="form-control" th:value="${employee.phone}"/></div>
        <div class="col-md-6"><label class="form-label fw-bold">Email</label><input type="email" name="email" class="form-control" th:value="${employee.email}"/></div>
        <div class="col-md-6"><label class="form-label fw-bold">Monthly Salary ₹</label><input type="number" step="0.01" name="monthlySalary" class="form-control" th:value="${employee.monthlySalary}"/></div>
        <div class="col-md-6"><label class="form-label fw-bold">Joining Date</label><input type="date" name="joiningDate" class="form-control" th:value="${employee.joiningDate}"/></div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-gold">Save</button>
          <a th:href="@{/admin/employees}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>

</body></html>
