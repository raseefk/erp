<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{fragments/layout :: head('Customer')}"></head>
<body>
<th:block th:insert="~{fragments/layout :: sidebar('customers')}"></th:block>
<div id="main">
  <th:block th:insert="~{fragments/layout :: topbar('Customer')}"></th:block>
  <div class="pb">
    <th:block th:insert="~{fragments/layout :: alerts}"></th:block>
    <div class="mt-1">
<div class="mb-3"><a th:href="@{/admin/customers}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="card card-levanto" style="max-width:540px;">
  <div class="card-header"><i class="bi bi-person me-2"></i><span th:text="${customer.id != null ? 'Edit Customer' : 'New Customer'}">Customer</span></div>
  <div class="card-body">
    <form th:action="@{/admin/customers/save}" method="post">
      <input type="hidden" name="id" th:value="${customer.id}"/>
      <div class="row g-3">
        <div class="col-12"><label class="form-label fw-bold">Full Name *</label><input type="text" name="name" class="form-control" th:value="${customer.name}" required/></div>
        <div class="col-md-6"><label class="form-label fw-bold">Phone *</label><input type="text" name="phone" class="form-control" th:value="${customer.phone}" required placeholder="10-digit mobile"/></div>
        <div class="col-md-6"><label class="form-label fw-bold">Email</label><input type="email" name="email" class="form-control" th:value="${customer.email}"/></div>
        <div class="col-md-6"><label class="form-label fw-bold">GSTIN</label><input type="text" name="gstNumber" class="form-control" th:value="${customer.gstNumber}" placeholder="Optional"/></div>
        <div class="col-12"><label class="form-label fw-bold">Address</label><textarea name="address" class="form-control" rows="2" th:text="${customer.address}"></textarea></div>
        <div class="col-12 d-flex gap-2"><button type="submit" class="btn btn-gold">Save</button><a th:href="@{/admin/customers}" class="btn btn-outline-secondary">Cancel</a></div>
      </div>
    </form>
  </div>
</div>
    </div>
  </div>
</div>
<th:block th:insert="~{fragments/layout :: scripts}"></th:block>

</body></html>
