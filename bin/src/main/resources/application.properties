# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=levanto-flooring

# ── H2 File-Persistent Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/levanto_db;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=Levanto@2024!
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Session ───────────────────────────────────────────────────────────────────
server.servlet.session.timeout=120m

# ── Multipart ─────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Company Branding (PDF & UI) ───────────────────────────────────────────────
app.company.name=L\u0113vanto Flooring
app.company.tagline=Premium Flooring Solutions
app.company.address=Your Shop Address, City, State \u2014 PIN Code
app.company.phone=+91 XXXXX XXXXX
app.company.email=info@levantoflooring.com
app.company.website=www.levantoflooring.com
app.company.gstNumber=YOUR_GSTIN_HERE
app.company.cgstRate=9
app.company.sgstRate=9

# ── Default Admin Credentials ─────────────────────────────────────────────────
app.admin.username=admin
app.admin.password=Admin@1234

# ── File Upload ───────────────────────────────────────────────────────────────
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
